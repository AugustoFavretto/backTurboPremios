version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PIX_GATEWAY: ${PIX_GATEWAY:-mock}
      PIX_KEY: ${PIX_KEY:-turbo@premios.com.br}
      PIX_MERCHANT_NAME: ${PIX_MERCHANT_NAME:-Turbo Premios}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://turbopremios.com.br}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres-local:
    image: postgres:16-alpine
    profiles:
      - local
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: turbo_premios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
